<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Список товарів</title>
  <link rel="stylesheet" href="products.css">
</head>
<body>

<header>
  <h1>🛒 Магазин</h1>
  <span>Загальна вартість: <span id="total-price">0 ₴</span></span>
</header>

<div class="container">

  <aside>
    <div class="filter-group">
      <h3>Категорії</h3>
      <div id="filter-btns"></div>
    </div>

    <div class="sort-group">
      <h3>Сортування</h3>
      <button class="sort-btn" data-sort="price">За ціною</button>
      <button class="sort-btn" data-sort="created">За датою створення</button>
      <button class="sort-btn" data-sort="updated">За датою оновлення</button>
      <button id="btn-reset-sort">Скинути</button>
    </div>
  </aside>

  <main>
    <div class="top-bar">
      <h2>Товари</h2>
      <button id="btn-add">+ Додати товар</button>
    </div>

    <p id="empty-msg" style="display:none">Наразі список товарів пустий. Додайте новий товар.</p>
    <div id="products-grid"></div>
  </main>

</div>

<!-- Модальне вікно -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Новий товар</h2>
    <form id="product-form" novalidate>
      <div class="form-group">
        <label>Назва *</label>
        <input type="text" id="f-name" placeholder="Назва товару" required minlength="2" maxlength="80">
      </div>
      <div class="form-group">
        <label>Ціна (₴) *</label>
        <input type="number" id="f-price" placeholder="0.00" required min="0.01" step="0.01">
      </div>
      <div class="form-group">
        <label>Категорія *</label>
        <select id="f-category" required>
          <option value="">— Оберіть —</option>
          <option value="Електроніка">Електроніка</option>
          <option value="Одяг">Одяг</option>
          <option value="Книги">Книги</option>
          <option value="Спорт">Спорт</option>
          <option value="Дім">Дім</option>
        </select>
      </div>
      <div class="form-group">
        <label>URL зображення</label>
        <input type="url" id="f-img" placeholder="https://...">
      </div>
      <div class="modal-btns">
        <button type="submit" class="btn-save">Зберегти</button>
        <button type="button" class="btn-cancel" id="btn-close-modal">Скасувати</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>

<script src="products.js"></script>
</body>
</html>
